apiVersion: v1
kind: Service
metadata:
  name: currencyservice
  labels:
    app.kubernetes.io/name: currencyservice
    app.kubernetes.io/part-of: boutique-lite
spec:
  selector:
    app.kubernetes.io/name: currencyservice
  ports:
    - name: grpc
      port: 7000
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: currencyservice
  labels:
    app.kubernetes.io/name: currencyservice
    app.kubernetes.io/part-of: boutique-lite
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: currencyservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: currencyservice
        app.kubernetes.io/part-of: boutique-lite
    spec:
      containers:
        - name: currencyservice
          image: boutique-lite/currencyservice:latest
          env:
            - name: PORT
              value: "7000"
            - name: DISABLE_PROFILER
              value: "1"
          ports:
            - name: grpc
              containerPort: 7000
          readinessProbe:
            grpc:
              port: 7000
          livenessProbe:
            grpc:
              port: 7000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
