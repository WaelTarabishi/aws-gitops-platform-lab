apiVersion: v1
kind: Service
metadata:
  name: checkoutservice
  labels:
    app.kubernetes.io/name: checkoutservice
    app.kubernetes.io/part-of: boutique-lite
spec:
  selector:
    app.kubernetes.io/name: checkoutservice
  ports:
    - name: grpc
      port: 5050
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkoutservice
  labels:
    app.kubernetes.io/name: checkoutservice
    app.kubernetes.io/part-of: boutique-lite
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: checkoutservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkoutservice
        app.kubernetes.io/part-of: boutique-lite
    spec:
      containers:
        - name: checkoutservice
          image: boutique-lite/checkoutservice:latest
          env:
            - name: PORT
              value: "5050"
            - name: SHIPPING_SERVICE_ADDR
              value: shippingservice:50051
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: productcatalogservice:3550
            - name: CART_SERVICE_ADDR
              value: cartservice:7070
            - name: CURRENCY_SERVICE_ADDR
              value: currencyservice:7000
            - name: EMAIL_SERVICE_ADDR
              value: emailservice:8080
            - name: PAYMENT_SERVICE_ADDR
              value: paymentservice:50051
          ports:
            - name: grpc
              containerPort: 5050
          readinessProbe:
            grpc:
              port: 5050
          livenessProbe:
            grpc:
              port: 5050
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
