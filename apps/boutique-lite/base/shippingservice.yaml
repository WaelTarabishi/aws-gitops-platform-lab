apiVersion: v1
kind: Service
metadata:
  name: shippingservice
  labels:
    app.kubernetes.io/name: shippingservice
    app.kubernetes.io/part-of: boutique-lite
spec:
  selector:
    app.kubernetes.io/name: shippingservice
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shippingservice
  labels:
    app.kubernetes.io/name: shippingservice
    app.kubernetes.io/part-of: boutique-lite
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shippingservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shippingservice
        app.kubernetes.io/part-of: boutique-lite
    spec:
      containers:
        - name: shippingservice
          image: boutique-lite/shippingservice:latest
          env:
            - name: PORT
              value: "50051"
            - name: DISABLE_PROFILER
              value: "1"
            - name: DISABLE_STATS
              value: "1"
            - name: DISABLE_TRACING
              value: "1"
          ports:
            - name: grpc
              containerPort: 50051
          readinessProbe:
            grpc:
              port: 50051
          livenessProbe:
            grpc:
              port: 50051
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
