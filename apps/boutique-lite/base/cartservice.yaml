apiVersion: v1
kind: Service
metadata:
  name: cartservice
  labels:
    app.kubernetes.io/name: cartservice
    app.kubernetes.io/part-of: boutique-lite
spec:
  selector:
    app.kubernetes.io/name: cartservice
  ports:
    - name: grpc
      port: 7070
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
  labels:
    app.kubernetes.io/name: cartservice
    app.kubernetes.io/part-of: boutique-lite
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cartservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cartservice
        app.kubernetes.io/part-of: boutique-lite
    spec:
      containers:
        - name: cartservice
          image: boutique-lite/cartservice:latest
          ports:
            - name: grpc
              containerPort: 7070
          readinessProbe:
            grpc:
              port: 7070
          livenessProbe:
            grpc:
              port: 7070
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
