apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: boutique-lite
spec:
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: boutique-lite
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: boutique-lite
    spec:
      containers:
        - name: frontend
          image: boutique-lite/frontend:latest
          env:
            - name: PORT
              value: "8080"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: productcatalogservice:3550
            - name: CURRENCY_SERVICE_ADDR
              value: currencyservice:7000
            - name: CART_SERVICE_ADDR
              value: cartservice:7070
            - name: RECOMMENDATION_SERVICE_ADDR
              value: recommendationservice:8080
            - name: CHECKOUT_SERVICE_ADDR
              value: checkoutservice:5050
            - name: SHIPPING_SERVICE_ADDR
              value: shippingservice:50051
            - name: AD_SERVICE_ADDR
              value: adservice:9555
            - name: SHOPPING_ASSISTANT_SERVICE_ADDR
              value: shoppingassistantservice:8080
            - name: ENABLE_ASSISTANT
              value: "false"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /_healthz
              port: http
          livenessProbe:
            httpGet:
              path: /_healthz
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
