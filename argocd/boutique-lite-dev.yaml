apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boutique-lite-dev
  namespace: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/WaelTarabishi/aws-gitops-platform-lab.git
    targetRevision: HEAD
    path: apps/boutique-lite/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: boutique-lite-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
