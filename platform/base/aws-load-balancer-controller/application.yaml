apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-load-balancer-controller
  namespace: argocd
spec:
  source:
    helm:
      skipCrds: true
      values: |
        clusterName: minimized-devops-dev-eks
        region: us-east-1
        vpcId: vpc-0a0d1d7863ba3c5a5
        serviceAccount:
          create: true
          name: aws-load-balancer-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
