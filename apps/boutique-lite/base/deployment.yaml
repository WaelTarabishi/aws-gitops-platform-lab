apiVersion: apps/v1
kind: Deployment
metadata:
  name: boutique-lite
  labels:
    app.kubernetes.io/name: boutique-lite
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: boutique-lite
  template:
    metadata:
      labels:
        app.kubernetes.io/name: boutique-lite
    spec:
      containers:
        - name: app
          image: hashicorp/http-echo:1.0.0
          args:
            - -listen=:8080
            - -text=boutique-lite dev app
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
          livenessProbe:
            httpGet:
              path: /
              port: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
