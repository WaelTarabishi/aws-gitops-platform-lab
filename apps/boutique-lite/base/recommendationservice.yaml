apiVersion: v1
kind: Service
metadata:
  name: recommendationservice
  labels:
    app.kubernetes.io/name: recommendationservice
    app.kubernetes.io/part-of: boutique-lite
spec:
  selector:
    app.kubernetes.io/name: recommendationservice
  ports:
    - name: grpc
      port: 8080
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendationservice
  labels:
    app.kubernetes.io/name: recommendationservice
    app.kubernetes.io/part-of: boutique-lite
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: recommendationservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: recommendationservice
        app.kubernetes.io/part-of: boutique-lite
    spec:
      containers:
        - name: recommendationservice
          image: boutique-lite/recommendationservice:latest
          env:
            - name: PORT
              value: "8080"
            - name: DISABLE_PROFILER
              value: "1"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: productcatalogservice:3550
          ports:
            - name: grpc
              containerPort: 8080
          readinessProbe:
            grpc:
              port: 8080
          livenessProbe:
            grpc:
              port: 8080
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 192Mi
