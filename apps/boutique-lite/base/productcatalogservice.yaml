apiVersion: v1
kind: Service
metadata:
  name: productcatalogservice
  labels:
    app.kubernetes.io/name: productcatalogservice
    app.kubernetes.io/part-of: boutique-lite
spec:
  selector:
    app.kubernetes.io/name: productcatalogservice
  ports:
    - name: grpc
      port: 3550
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice
  labels:
    app.kubernetes.io/name: productcatalogservice
    app.kubernetes.io/part-of: boutique-lite
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: productcatalogservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: productcatalogservice
        app.kubernetes.io/part-of: boutique-lite
    spec:
      containers:
        - name: productcatalogservice
          image: boutique-lite/productcatalogservice:latest
          env:
            - name: PORT
              value: "3550"
            - name: DISABLE_PROFILER
              value: "1"
          ports:
            - name: grpc
              containerPort: 3550
          readinessProbe:
            grpc:
              port: 3550
          livenessProbe:
            grpc:
              port: 3550
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
